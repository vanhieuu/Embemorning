<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="EmbeMorning Demo - phiên bản demo tối giản của trang web sinh nhật."
    />
    <title>EmbeMorning Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="sparkles" id="sparkles"></div>

    <main class="page-shell">
      <section class="hero panel">
        <div class="hero-copy">
          <p class="hero-kicker" id="heroKicker">EmbeMorning Demo</p>
          <h1 id="heroTitle">Chúc mừng sinh nhật</h1>
          <p class="hero-lead" id="heroLead"></p>
          <p class="hero-note" id="heroNote"></p>
          <div class="hero-chips" id="heroChips"></div>
        </div>

        <aside class="hero-card">
          <div class="hero-stamp">
            <span class="hero-stamp-label">Demo Cut</span>
            <strong id="heroDateValue">27/06</strong>
            <small id="heroDateNote"></small>
          </div>
          <p class="hero-card-copy" id="heroCardCopy"></p>
        </aside>
      </section>

      <section class="story-grid">
        <article class="panel story-card accent-card">
          <p class="eyebrow">Lời Chúc Mở Đầu</p>
          <h2>Giữ lại đúng phần cần thiết nhất cho bản demo</h2>
          <p id="storyIntro"></p>
        </article>

        <article class="panel story-card">
          <p class="eyebrow">Bảng Lời Chúc</p>
          <div class="wish-list" id="wishList"></div>
        </article>
      </section>

      <section class="panel photo-section" id="photoSection">
        <div class="section-heading">
          <p class="eyebrow">Photo Drop</p>
          <h2>Ảnh được giữ lại nguyên vẹn trong bản demo này</h2>
        </div>
        <p class="photo-lead" id="photoLead"></p>
        <div class="photo-gallery" id="photoGallery"></div>
      </section>

      <section class="panel moments-section">
        <div class="section-heading">
          <p class="eyebrow">Section Thứ Hai</p>
          <h2>Thêm một cụm nội dung ngắn để bản demo vẫn đủ cảm xúc</h2>
        </div>
        <div class="moments-grid" id="momentsGrid"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
